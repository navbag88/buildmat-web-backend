# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database ──────────────────────────────────────────────────────────────────
# Railway injects DATABASE_URL automatically. Locally uses H2.
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:buildmat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 console (local dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:BuildMatSecretKey2024VeryLongSecretKeyForHS256Algorithm}
jwt.expiry.ms=${JWT_EXPIRY_MS:86400000}

# ── File upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:3000}
