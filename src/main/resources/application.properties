# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database ──────────────────────────────────────────────────────────────────
# Railway injects DATABASE_URL automatically. Locally uses H2.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/buildmat}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

# H2 console (local dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:BuildMatSecretKey2024VeryLongSecretKeyForHS256Algorithm}
jwt.expiry.ms=${JWT_EXPIRY_MS:86400000}

# ── File upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ──────────────────────────────────────────────────────────────────────
# Include the gateway origin (8090) so browser requests routed via gateway carry cookies correctly
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:3000,http://localhost:8090}

# ── Logging ───────────────────────────────────────────────────────────────────
# Directory where log files are written. Override with LOG_DIR env var.
logging.file.path=${LOG_DIR:logs}

# ── Session ───────────────────────────────────────────────────────────────────
# Server-side session lifetime in seconds (default 24 h)
session.expiry.seconds=${SESSION_EXPIRY_SECONDS:86400}
# Set to true in production (HTTPS only)
session.cookie.secure=${SESSION_COOKIE_SECURE:false}
