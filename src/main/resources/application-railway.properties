# Railway MySQL profile - activated automatically when DATABASE_URL starts with jdbc:mysql
# Set SPRING_PROFILES_ACTIVE=railway in Railway environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.connection-init-sql=SET FOREIGN_KEY_CHECKS=0
spring.h2.console.enabled=false

# ── Session (production — cookies require HTTPS) ──────────────────────────────
session.cookie.secure=true
